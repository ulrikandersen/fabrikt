openapi: "3.0.0"
info:
  title: "Inline Enum Parameters API"
  version: "1.0"
paths:
  /items:
    parameters:
      - name: sort_order
        in: query
        required: false
        schema:
          type: string
          enum:
            - asc
            - desc
    get:
      operationId: listItems
      summary: "List items"
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - active
              - inactive
              - archived
        - name: X-Request-Source
          in: header
          required: false
          schema:
            type: string
            enum:
              - web
              - mobile
              - api
      responses:
        200:
          description: "successful operation"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
  /items/{itemId}:
    get:
      operationId: getItem
      summary: "Get a single item"
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
        - name: detail_level
          in: query
          required: false
          schema:
            type: string
            enum:
              - summary
              - full
              - verbose
      responses:
        200:
          description: "successful operation"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
components:
  schemas:
    Item:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
